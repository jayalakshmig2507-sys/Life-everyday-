<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

<div class="max-w-4xl mx-auto bg-white shadow-lg rounded-xl overflow-hidden">

  <!-- Header -->
  <div class="bg-indigo-600 p-4">
    <h1 class="text-white text-xl font-bold text-center">📊 Life Tracker</h1>
  </div>

  <!-- Image -->
  <div class="p-4 text-center">
    <img src="https://i.postimg.cc/MnrX2g21/2da0fa98.png"
         class="w-1/2 mx-auto object-contain rounded-lg shadow-md">
  </div>

  <!-- Form -->
  <div class="p-4 space-y-2">
    <input id="companyName" placeholder="Company Name" class="w-full p-2 border rounded">
    <input id="jobDescription" placeholder="Job Description" class="w-full p-2 border rounded">
    <input id="contactName" placeholder="Contact Name" class="w-full p-2 border rounded">
    <input id="contactEmail" placeholder="Contact Email" class="w-full p-2 border rounded">
    <input id="followUpDate" type="date" class="w-full p-2 border rounded">

    <select id="status" class="w-full p-2 border rounded">
      <option value="pending">Pending</option>
      <option value="done">Done</option>
    </select>

    <button id="saveTask"
      class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">
      Save Task
    </button>
  </div>

  <!-- Task List -->
  <div class="p-4">
    <h2 class="font-bold mb-2">Saved Tasks</h2>
    <div id="taskList" class="space-y-2">
      <p class="text-gray-400">No tasks yet...</p>
    </div>
  </div>

</div>

<!-- ✅ Firebase Script -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Config
const firebaseConfig = {
  apiKey: "AIzaSyC1IkJhlE0Z6vqSjbGwkxPfT2udshsQCBc",
  authDomain: "jayam-personal-2026.firebaseapp.com",
  projectId: "jayam-personal-2026",
  storageBucket: "jayam-personal-2026.firebasestorage.app",
  messagingSenderId: "62160466692",
  appId: "1:62160466692:web:a2587dce772da5a6861651",
  measurementId: "G-YX1KZYZFEL"
};

// Init
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const saveBtn = document.getElementById("saveTask");
const taskList = document.getElementById("taskList");

// ✅ SAVE TASK
saveBtn.addEventListener("click", async () => {

  const companyName = document.getElementById("companyName").value;
  const followUpDate = document.getElementById("followUpDate").value;

  if (!companyName || !followUpDate) {
    alert("Please fill required fields");
    return;
  }

  try {
    await addDoc(collection(db, "tasks"), {
      companyName,
      jobDescription: document.getElementById("jobDescription").value,
      contactName: document.getElementById("contactName").value,
      contactEmail: document.getElementById("contactEmail").value,
      followUpDate,
      status: document.getElementById("status").value,
      createdAt: serverTimestamp()
    });

    alert("✅ Task Saved!");

    // clear form
    document.querySelectorAll("input").forEach(i => i.value = "");
    document.getElementById("status").value = "pending";

  } catch (err) {
    console.error(err);
    alert("❌ Error saving task");
  }
});

// ✅ REAL-TIME DISPLAY (Fixes refresh issue)
const q = query(collection(db, "tasks"), orderBy("createdAt", "desc"));

onSnapshot(q, (snapshot) => {
  taskList.innerHTML = "";

  if (snapshot.empty) {
    taskList.innerHTML = '<p class="text-gray-400">No tasks yet...</p>';
    return;
  }

  snapshot.forEach(doc => {
    const data = doc.data();

    const div = document.createElement("div");
    div.className = "p-3 border rounded bg-gray-50";

    div.innerHTML = `
      <div class="font-bold">${data.companyName}</div>
      <div class="text-sm">${data.jobDescription || ""}</div>
      <div class="text-sm">${data.contactName || ""} | ${data.contactEmail || ""}</div>
      <div class="text-sm">Follow-up: ${data.followUpDate}</div>
      <div class="text-xs text-gray-500">Status: ${data.status}</div>
    `;

    taskList.appendChild(div);
  });
});

</script>

</body>
</html>
